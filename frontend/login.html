<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>登入 — 設備警報查詢系統</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body class="login-page">
  <main class="login-main">
    <div class="login-card">

      <div class="login-icon">
        <img src="/icon.svg" alt="" width="64" height="64" />
      </div>

      <h1>設備警報查詢系統</h1>
      <p class="login-sub">請輸入密碼以進入系統</p>

      <form method="post" action="/login" class="login-form">
        <input type="hidden" name="next" id="nextField" value="" />

        <div id="errMsg" class="login-error" hidden>
          密碼錯誤，請再試一次
        </div>

        <label for="pw">密碼</label>
        <input
          type="password"
          id="pw"
          name="password"
          autocomplete="current-password"
          placeholder="輸入密碼"
          autofocus
          required
        />

        <button type="submit">進入系統</button>
      </form>

      <div class="login-qr">
        <p class="login-qr-label">掃碼在手機開啟</p>
        <canvas id="qrCanvas" width="160" height="160"></canvas>
      </div>

    </div>
  </main>

  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('next')) document.getElementById('nextField').value = p.get('next');
    if (p.get('error')) document.getElementById('errMsg').hidden = false;

    window.QRCode.toCanvas(document.getElementById('qrCanvas'), window.location.origin + '/', {
      width: 160, margin: 2,
      color: { dark: '#1f2937', light: '#ffffff' }
    }, () => {});
  </script>
</body>
</html>
