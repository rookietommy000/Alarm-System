<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>登入 — 設備警報查詢系統</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #192330;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #e2e8f0;
      letter-spacing: -0.3px;
      margin-bottom: 32px;
      text-align: center;
    }

    .error-msg {
      background: rgba(248,113,113,0.12);
      color: #f87171;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
      border: 1px solid rgba(248,113,113,0.25);
    }

    .input-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    input[type=password] {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      border: 1.5px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      background: #0f1923;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type=password]:focus { border-color: #4ddbc4; }
    input[type=password]::placeholder { color: #64748b; }

    button[type=submit] {
      width: 100%;
      padding: 14px;
      background: #4ddbc4;
      color: #0a1118;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    button[type=submit]:hover { background: #3cc9b0; }
    button[type=submit]:active { background: #2bb8a0; }

    .back-btn {
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 8px 20px;
      display: inline-block;
      transition: background 0.15s, color 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider span {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .qr-wrap canvas {
      border-radius: 10px;
      display: block;
      background: #fff;
      padding: 8px;
    }
    .qr-hint {
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="title">設備警報查詢系統</p>

    <form method="post" action="/login" id="loginForm">
      <input type="hidden" name="next" id="nextField" value="" />

      <div class="error-msg" id="errMsg" style="display:none">
        密碼錯誤，請再試一次
      </div>

      <div class="input-wrap">
        <input
          type="password"
          name="password"
          id="pw"
          autocomplete="current-password"
          placeholder="輸入密碼"
          autofocus
          required
        />
      </div>

      <button type="submit">進入系統</button>
    </form>

    <div style="text-align:center; margin-top:16px;">
      <a href="/" class="back-btn">← 返回入口</a>
    </div>

    <div class="divider"><span>或掃碼開啟</span></div>

    <div class="qr-wrap">
      <canvas id="qrCanvas" width="148" height="148"></canvas>
      <span class="qr-hint">手機掃碼直接進入</span>
    </div>
  </div>

  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('next')) document.getElementById('nextField').value = p.get('next');
    if (p.get('error')) document.getElementById('errMsg').style.display = 'block';

    window.QRCode.toCanvas(document.getElementById('qrCanvas'), window.location.origin + '/', {
      width: 148, margin: 1,
      color: { dark: '#111111', light: '#ffffff' }
    }, () => {});
  </script>
</body>
</html>
