<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <title>管理員登入 — 設備警報查詢系統</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body {
      background: #1f2937;
      min-height: 100vh;
    }
    .modal-header {
      background: #1f2937;
      color: #fff;
      border-bottom: 1px solid #374151;
    }
    .modal-header .btn-close {
      filter: invert(1);
    }
    .modal-content {
      border: none;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .modal-icon {
      width: 56px;
      height: 56px;
      background: #374151;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .modal-icon img {
      width: 36px;
      height: 36px;
    }
    .admin-badge {
      display: inline-block;
      background: #92400e;
      color: #fef3c7;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <!-- Modal -->
  <div class="modal fade" id="adminLoginModal" tabindex="-1"
       data-bs-backdrop="static" data-bs-keyboard="false"
       aria-labelledby="adminLoginLabel" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title w-100 text-center" id="adminLoginLabel">
            警報代碼 · 後台管理
          </h5>
        </div>

        <div class="modal-body px-4 py-4">
          <div class="text-center mb-3">
            <div class="modal-icon">
              <img src="/icon.svg" alt="" />
            </div>
            <span class="admin-badge">ADMIN</span>
            <h6 class="mb-1 fw-bold mt-1">後台管理員登入</h6>
            <p class="text-muted small mb-0">此區域僅限管理員使用</p>
          </div>

          <div id="errMsg" class="alert alert-danger py-2 text-center small" hidden>
            密碼錯誤，請再試一次
          </div>

          <form method="post" action="/admin/login">
            <div class="mb-3">
              <label for="pw" class="form-label fw-semibold">管理員密碼</label>
              <input
                type="password"
                id="pw"
                name="password"
                class="form-control form-control-lg"
                autocomplete="current-password"
                placeholder="輸入管理員密碼"
                autofocus
                required
              />
            </div>
            <div class="d-grid mb-2">
              <button type="submit" class="btn btn-dark btn-lg">進入後台</button>
            </div>
          </form>
        </div>

        <div class="modal-footer justify-content-center border-top pt-2 pb-3">
          <a href="/" class="text-muted small text-decoration-none">← 返回查詢介面</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('error')) document.getElementById('errMsg').hidden = false;

    const modal = new bootstrap.Modal(document.getElementById('adminLoginModal'));
    modal.show();
  </script>
</body>
</html>
