<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1f2937" />
  <title>管理員登入 — 設備警報查詢系統</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body {
      background: #0f1923;
      min-height: 100vh;
    }
    .modal-header {
      background: #0a1118;
      color: #e2e8f0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .modal-header .btn-close { filter: invert(1); opacity: 0.7; }
    .modal-header .btn-close:hover { opacity: 1; }
    .modal-content {
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      background: #192330;
    }
    .modal-body { background: #192330; color: #e2e8f0; }
    .modal-footer { background: #192330; border-top: 1px solid rgba(255,255,255,0.07); }
    .modal-icon {
      width: 56px;
      height: 56px;
      background: rgba(77,219,196,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }
    .modal-icon img { width: 36px; height: 36px; }
    .back-btn {
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 6px 16px;
      display: inline-block;
      transition: background 0.15s, color 0.15s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .admin-badge {
      display: inline-block;
      background: rgba(255,154,60,0.15);
      color: #ff9a3c;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,154,60,0.3);
      margin-bottom: 4px;
    }
    .text-muted { color: #64748b !important; }
    h6.fw-bold { color: #e2e8f0; }
    .form-label { color: #94a3b8; }
    .form-control {
      background: #0f1923;
      border-color: rgba(255,255,255,0.14);
      color: #e2e8f0;
    }
    .form-control:focus {
      background: #0f1923;
      border-color: #4ddbc4;
      color: #e2e8f0;
      box-shadow: 0 0 0 3px rgba(77,219,196,0.2);
    }
    .form-control::placeholder { color: #64748b; }
    .btn-dark { background: #4ddbc4; border-color: #4ddbc4; color: #0a1118; font-weight: 600; }
    .btn-dark:hover { background: #3cc9b0; border-color: #3cc9b0; color: #0a1118; }
    .small.text-muted { color: #64748b !important; }
  </style>
</head>
<body>

  <!-- Modal -->
  <div class="modal fade" id="adminLoginModal" tabindex="-1"
       data-bs-backdrop="static" data-bs-keyboard="false"
       aria-labelledby="adminLoginLabel" aria-modal="true" role="dialog">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title w-100 text-center" id="adminLoginLabel">
            警報代碼 · 後台管理
          </h5>
        </div>

        <div class="modal-body px-4 py-4">
          <div class="text-center mb-3">
            <div class="modal-icon">
              <img src="/icon.svg" alt="" />
            </div>
            <span class="admin-badge">ADMIN</span>
            <h6 class="mb-1 fw-bold mt-1">後台管理員登入</h6>
            <p class="text-muted small mb-0">此區域僅限管理員使用</p>
          </div>

          <div id="errMsg" class="alert alert-danger py-2 text-center small" hidden>
            密碼錯誤，請再試一次
          </div>

          <form method="post" action="/admin/login">
            <div class="mb-3">
              <label for="pw" class="form-label fw-semibold">管理員密碼</label>
              <input
                type="password"
                id="pw"
                name="password"
                class="form-control form-control-lg"
                autocomplete="current-password"
                placeholder="輸入管理員密碼"
                autofocus
                required
              />
            </div>
            <div class="d-grid mb-2">
              <button type="submit" class="btn btn-dark btn-lg">進入後台</button>
            </div>
          </form>
        </div>

        <div class="modal-footer justify-content-between border-top pt-2 pb-3">
          <a href="/app" class="back-btn">← 返回查詢介面</a>
          <span class="text-muted small">製造四部 · 內部使用系統</span>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const p = new URLSearchParams(window.location.search);
    if (p.get('error')) document.getElementById('errMsg').hidden = false;

    const modalEl = document.getElementById('adminLoginModal');
    const modal = new bootstrap.Modal(modalEl);
    modalEl.addEventListener('shown.bs.modal', () => {
      document.getElementById('pw').focus();
    });
    modal.show();
  </script>
</body>
</html>
